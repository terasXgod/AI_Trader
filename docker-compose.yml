services:
  kafka:
    image: apache/kafka:latest
    container_name: ai-trader-kafka
    ports:
      - "9092:9092"
    environment:
      - KAFKA_CFG_NODE_ID=0
      - KAFKA_CFG_PROCESS_ROLES=controller,broker
      - KAFKA_CFG_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_CFG_LISTENERS=PLAINTEXT://:9092,CONTROLLER://:9093
      - KAFKA_CFG_ADVERTISED_LISTENERS=PLAINTEXT://kafka:9092
      - KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP=CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      - KAFKA_CFG_CONTROLLER_QUORUM_VOTERS=0@kafka:9093
      - KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE=true

  kafdrop:
    image: obsidiandynamics/kafdrop:latest
    container_name: ai-trader-kafdrop
    ports:
      - "9000:9000"
    environment:
      - KAFKA_BROKERCONNECT=kafka:9092
    depends_on:
      - kafka

  db:
    image: postgres:16-alpine
    container_name: ai-trader-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-auth_db}
      POSTGRES_USER: ${POSTGRES_USER:-auth_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-auth_pass}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - auth-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-auth_user} -d ${POSTGRES_DB:-auth_db}"]
      interval: 10s
      timeout: 5s
      retries: 5


  redis:
    image: redis:7-alpine
    container_name: ai-trader-redis
    ports:
      - "${REDIS_PORT}:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    command: redis-server --appendonly yes

  auth-service:
    build:
      context: .
      dockerfile: auth-service/Dockerfile
    container_name: ai-trader-auth-service
    depends_on:
      kafka:
        condition: service_started
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: ${SPRING_DATASOURCE_URL:-jdbc:postgresql://db:5432/${POSTGRES_DB:-auth_db}}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-auth_user}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-auth_pass}
      SPRING_REDIS_HOST: ${SPRING_REDIS_HOST:-redis}
      SPRING_REDIS_PORT: ${SPRING_REDIS_PORT:-6379}
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS:-kafka:9092}
      SPRING_JPA_HIBERNATE_DDL_AUTO: ${SPRING_JPA_HIBERNATE_DDL_AUTO:-update}
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      JWT_EXPIRATION: ${JWT_EXPIRATION:-86400000}
      JWT_REFRESH_EXPIRATION: ${JWT_REFRESH_EXPIRATION:-604800000}
    ports:
      - "${AUTH_SERVICE_PORT}:8080"

  core-service:
    build:
      context: .
      dockerfile: core-service/Dockerfile
    container_name: ai-trader-core-service
    depends_on:
      db:
        condition: service_healthy
      auth-service:
        condition: service_started
    environment:
      SPRING_DATASOURCE_URL: ${CORE_DATASOURCE_URL:-jdbc:postgresql://db:5432/${POSTGRES_DB:-auth_db}}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-auth_user}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-auth_pass}
      SPRING_JPA_HIBERNATE_DDL_AUTO: ${SPRING_JPA_HIBERNATE_DDL_AUTO:-update}
      SERVER_PORT: ${CORE_SERVER_PORT:-8081}
      AUTH_SERVICE_URL: http://auth-service:8080
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
    ports:
      - "${CORE_SERVICE_PORT}:8081"

  notification-service:
    build:
      context: .
      dockerfile: notification-service/Dockerfile
    container_name: ai-trader-notification-service
    depends_on:
      kafka:
        condition: service_started
      db:
        condition: service_healthy
      auth-service:
        condition: service_started
    environment:
      SPRING_DATASOURCE_URL: ${NOTIFICATION_DATASOURCE_URL:-jdbc:postgresql://db:5432/${POSTGRES_DB:-auth_db}}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-auth_user}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-auth_pass}
      SPRING_JPA_HIBERNATE_DDL_AUTO: ${SPRING_JPA_HIBERNATE_DDL_AUTO:-update}
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS:-kafka:9092}
      NOTIFICATION_KAFKA_RETRY_MAX_ATTEMPTS: ${NOTIFICATION_KAFKA_RETRY_MAX_ATTEMPTS:-3}
      NOTIFICATION_KAFKA_RETRY_BACKOFF_MS: ${NOTIFICATION_KAFKA_RETRY_BACKOFF_MS:-1000}
      NOTIFICATION_MAIL_ENABLED: ${NOTIFICATION_MAIL_ENABLED:-false}
      SERVER_PORT: ${NOTIFICATION_SERVICE_PORT:-8082}
      AUTH_SERVICE_URL: http://auth-service:8080
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
    ports:
      - "${NOTIFICATION_SERVICE_PORT}:8082"

volumes:
  auth-postgres-data:
  redis-data:


